<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>Tainan Butokuden — Intro Animation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Cinzel:wght@600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #04000c;
  overflow: hidden;
  width: 1920px;
  height: 1080px;
}

/* ─── Enso circle draw ─── */
.enso {
  stroke-dasharray: 1382;
  stroke-dashoffset: 1382;
  animation: draw-enso 1.6s cubic-bezier(0.4, 0, 0.15, 1) 0.7s forwards;
}
@keyframes draw-enso { to { stroke-dashoffset: 0; } }

/* ─── Background atmosphere ─── */
.bg-vignette { opacity: 0; animation: fade-in 2.2s ease 0.3s forwards; }

/* ─── Swords ─── */
.sword-l {
  opacity: 0;
  transform: translateY(48px);
  animation: sword-up 0.5s cubic-bezier(0.2, 0, 0.1, 1) 2.3s forwards;
}
.sword-r {
  opacity: 0;
  transform: translateY(48px);
  animation: sword-up 0.5s cubic-bezier(0.2, 0, 0.1, 1) 2.52s forwards;
}
@keyframes sword-up { to { opacity: 1; transform: translateY(0); } }

.guard-l, .guard-r {
  opacity: 0;
  animation: fade-in 0.3s ease 2.7s forwards;
}

/* ─── Flower bloom ─── */
.flower {
  opacity: 0;
  animation: bloom 1s cubic-bezier(0.34, 1.56, 0.64, 1) 2.85s forwards;
}
@keyframes bloom {
  0%   { opacity: 0; transform: scale(0.12); }
  60%  { opacity: 1; }
  100% { opacity: 1; transform: scale(1); }
}

/* ─── Kanji ink-drop reveal ─── */
.k1 { opacity: 0; animation: ink-drop 0.55s ease-out 3.2s  forwards; }
.k2 { opacity: 0; animation: ink-drop 0.55s ease-out 3.58s forwards; }
.k3 { opacity: 0; animation: ink-drop 0.55s ease-out 3.96s forwards; }

@keyframes ink-drop {
  0%   { opacity: 0; transform: scale(1.1); filter: blur(5px); }
  55%  { filter: blur(1px); }
  100% { opacity: 1; transform: scale(1); filter: blur(0); }
}

/* ─── Latin text glide-up ─── */
.lt { opacity: 0; transform: translateY(18px); animation: text-up 0.5s ease-out 4.35s forwards; }
.lb { opacity: 0; transform: translateY(18px); animation: text-up 0.5s ease-out 4.65s forwards; }
@keyframes text-up { to { opacity: 1; transform: translateY(0); } }

/* ─── Final aura pulse ─── */
.aura { opacity: 0; animation: aura-glow 1.8s ease-in-out 5.1s forwards; }
@keyframes aura-glow {
  0%   { opacity: 0; }
  40%  { opacity: 1; }
  100% { opacity: 0.45; }
}

@keyframes fade-in { to { opacity: 1; } }

/* ─── Replay button ─── */
#replay {
  position: fixed; bottom: 18px; right: 18px;
  padding: 7px 16px; cursor: pointer;
  background: rgba(201,151,58,0.1);
  border: 1px solid rgba(201,151,58,0.35);
  color: #c9973a; font: 11px/1.4 monospace;
  border-radius: 4px; z-index: 10;
  transition: background 0.2s;
}
#replay:hover { background: rgba(201,151,58,0.22); }

/* ─── Help hint ─── */
#hint {
  position: fixed; bottom: 18px; left: 18px;
  color: rgba(201,151,58,0.4); font: 10px/1.6 monospace;
  pointer-events: none;
}
</style>
</head>
<body>

<svg xmlns="http://www.w3.org/2000/svg"
     width="1920" height="1080"
     viewBox="0 0 1920 1080">
<defs>

  <!-- Page background -->
  <radialGradient id="pgBg" cx="50%" cy="47%" r="47%">
    <stop offset="0%"   stop-color="#200428"/>
    <stop offset="52%"  stop-color="#0e0119"/>
    <stop offset="100%" stop-color="#04000c"/>
  </radialGradient>

  <!-- Gold gradient -->
  <linearGradient id="gld" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%"   stop-color="#eece76"/>
    <stop offset="48%"  stop-color="#c9973a"/>
    <stop offset="100%" stop-color="#9c7020"/>
  </linearGradient>

  <!-- Warm gold (for flower stamens) -->
  <linearGradient id="gldWarm" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%"  stop-color="#f0d880"/>
    <stop offset="100%" stop-color="#c9973a"/>
  </linearGradient>

  <!-- Aura radial -->
  <radialGradient id="aurGrd" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#c9973a" stop-opacity="0.38"/>
    <stop offset="60%"  stop-color="#c9973a" stop-opacity="0.07"/>
    <stop offset="100%" stop-color="#c9973a" stop-opacity="0"/>
  </radialGradient>

  <!-- Gold glow (enso, swords, latin) -->
  <filter id="gGlow" x="-22%" y="-22%" width="144%" height="144%">
    <feGaussianBlur stdDeviation="4.5" result="bl"/>
    <feMerge>
      <feMergeNode in="bl"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>

  <!-- Soft glow (kanji) -->
  <filter id="kGlow" x="-10%" y="-10%" width="120%" height="120%">
    <feGaussianBlur stdDeviation="2.5" result="bl"/>
    <feMerge>
      <feMergeNode in="bl"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>

</defs>

<!-- ── Background ── -->
<rect width="1920" height="1080" fill="url(#pgBg)"/>

<!-- Atmospheric center glow -->
<ellipse class="bg-vignette"
  cx="960" cy="462" rx="370" ry="305"
  fill="#240536" opacity="0.65"/>

<!-- ═══════════════════════════════════════════
     LOGO — centered at (960, 455)
═══════════════════════════════════════════ -->
<g transform="translate(960,455)">

  <!-- Aura glow circle (last element to appear) -->
  <circle class="aura" cx="0" cy="-12" r="275" fill="url(#aurGrd)"/>

  <!-- ── ENSO CIRCLE ──
       r=220, circumference ≈ 1382
       rotated -88° so brushstroke gap is top-right
  -->
  <circle class="enso"
    cx="0" cy="-12" r="220"
    fill="none"
    stroke="url(#gld)"
    stroke-width="13"
    stroke-linecap="round"
    transform="rotate(-88)"
    filter="url(#gGlow)"
  />

  <!-- ── LEFT SWORD (shinai) ──
       Blade tip: (42, -198) → Handle: (-198, 232)
       Guard (tsuba) at ~1/3 from handle: (-90, 62)
  -->
  <g class="sword-l" filter="url(#gGlow)">
    <!-- blade body -->
    <line x1="-198" y1="232" x2="42" y2="-198"
      stroke="url(#gld)" stroke-width="9.5" stroke-linecap="round"/>
    <!-- tip cap -->
    <ellipse cx="40" cy="-195" rx="5" ry="12"
      fill="#eece76" transform="rotate(-28, 40, -195)"/>
  </g>
  <!-- tsuba (guard) -->
  <g class="guard-l" filter="url(#gGlow)">
    <ellipse cx="-92" cy="60" rx="23" ry="8.5"
      fill="url(#gld)" transform="rotate(-62, -92, 60)"/>
  </g>

  <!-- ── RIGHT SWORD (mirror) ── -->
  <g class="sword-r" filter="url(#gGlow)">
    <line x1="198" y1="232" x2="-42" y2="-198"
      stroke="url(#gld)" stroke-width="9.5" stroke-linecap="round"/>
    <ellipse cx="-40" cy="-195" rx="5" ry="12"
      fill="#eece76" transform="rotate(28, -40, -195)"/>
  </g>
  <g class="guard-r" filter="url(#gGlow)">
    <ellipse cx="92" cy="60" rx="23" ry="8.5"
      fill="url(#gld)" transform="rotate(62, 92, 60)"/>
  </g>

  <!-- ── FLOWER GROUP ──
       Positioned left-center of circle
       Flower center: (-162, -122)
       Stem base: (-155, 148)
  -->
  <g class="flower">
    <!-- Stem -->
    <path d="M -155 148 C -158 100 -162 32 -163 -38 C -163 -78 -162 -102 -162 -112"
      stroke="#4a6030" stroke-width="5.5" fill="none" stroke-linecap="round"/>

    <!-- Leaf 1 (left) -->
    <path d="M -163 28 C -180 10 -196 14 -198 27 C -183 32 -169 32 -163 28 Z"
      fill="#3a5225"/>
    <!-- Leaf 2 (right, upper) -->
    <path d="M -160 -20 C -147 -33 -137 -29 -138 -20 C -147 -14 -158 -15 -160 -20 Z"
      fill="#4a6030"/>

    <!-- 5 petals rotated around center (-162, -122) -->
    <!-- Each petal: ellipse pointing "up" from center, rotated by 72° steps -->
    <ellipse cx="-162" cy="-160" rx="17" ry="34" fill="#c42b1e" opacity="0.95"/>
    <ellipse cx="-162" cy="-160" rx="17" ry="34" fill="#d43020" opacity="0.90"
      transform="rotate(72, -162, -122)"/>
    <ellipse cx="-162" cy="-160" rx="17" ry="34" fill="#b92015" opacity="0.88"
      transform="rotate(144, -162, -122)"/>
    <ellipse cx="-162" cy="-160" rx="17" ry="34" fill="#c42b1e" opacity="0.87"
      transform="rotate(216, -162, -122)"/>
    <ellipse cx="-162" cy="-160" rx="17" ry="34" fill="#d43020" opacity="0.90"
      transform="rotate(288, -162, -122)"/>

    <!-- Stamen dark ring -->
    <circle cx="-162" cy="-122" r="14" fill="#6e1206"/>
    <circle cx="-162" cy="-122" r="9"  fill="#a81a0e"/>
    <!-- Stamen dots (6 arranged in ring) -->
    <circle cx="-162" cy="-134" r="2.8" fill="#ffbe22" opacity="0.92"/>
    <circle cx="-152" cy="-129" r="2.8" fill="#ffbe22" opacity="0.92"/>
    <circle cx="-152" cy="-115" r="2.8" fill="#ffbe22" opacity="0.92"/>
    <circle cx="-162" cy="-110" r="2.8" fill="#ffbe22" opacity="0.92"/>
    <circle cx="-172" cy="-115" r="2.8" fill="#ffbe22" opacity="0.92"/>
    <circle cx="-172" cy="-129" r="2.8" fill="#ffbe22" opacity="0.92"/>
  </g>

  <!-- ── KANJI 武德殿 ──
       Right-center of circle
       x=75 (right of center), baselines: -132, 12, 156
       Font-size 132 → cap height ≈ 106px, descender ≈ 28px
       Three chars span: top(-238) to bottom(184) ≈ 422px
  -->
  <text class="k1"
    x="75" y="-132"
    font-family="'Ma Shan Zheng','STFangsong','標楷體',serif"
    font-size="132"
    fill="#e8dbb0"
    text-anchor="middle"
    filter="url(#kGlow)"
  >武</text>

  <text class="k2"
    x="75" y="12"
    font-family="'Ma Shan Zheng','STFangsong','標楷體',serif"
    font-size="132"
    fill="#e8dbb0"
    text-anchor="middle"
    filter="url(#kGlow)"
  >德</text>

  <text class="k3"
    x="75" y="156"
    font-family="'Ma Shan Zheng','STFangsong','標楷體',serif"
    font-size="132"
    fill="#e8dbb0"
    text-anchor="middle"
    filter="url(#kGlow)"
  >殿</text>

  <!-- ── LATIN TEXT ── -->
  <text class="lt"
    x="0" y="285"
    font-family="'Cinzel',serif"
    font-size="52"
    font-weight="600"
    fill="#c9973a"
    text-anchor="middle"
    style="letter-spacing: 18px"
    filter="url(#gGlow)"
  >TAINAN</text>

  <text class="lb"
    x="0" y="352"
    font-family="'Cinzel',serif"
    font-size="52"
    font-weight="600"
    fill="#c9973a"
    text-anchor="middle"
    style="letter-spacing: 9px"
    filter="url(#gGlow)"
  >BUTOKUDEN</text>

</g><!-- end logo group -->

</svg>

<button id="replay" onclick="location.reload()">▶ Replay [R]</button>
<div id="hint">F = Fullscreen &nbsp;|&nbsp; R = Replay</div>

<script>
  // Keyboard shortcuts
  document.addEventListener('keydown', e => {
    const k = e.key.toLowerCase();
    if (k === 'r') location.reload();
    if (k === 'f') {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(() => {});
      } else {
        document.exitFullscreen();
      }
    }
  });

  // Auto-hide hint after 4s
  setTimeout(() => {
    const h = document.getElementById('hint');
    if (h) h.style.opacity = '0';
    h.style.transition = 'opacity 1s';
  }, 4000);
</script>
</body>
</html>
